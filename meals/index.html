<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Peachy Pantry — Meal Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Peachy Pantry Meal Planner — Plan your week, track what's ready to cook, and let the shopping list build itself.">
  <meta name="theme-color" content="#2A241E">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/shared.css?v=9">
  <link rel="stylesheet" href="meals.css?v=9">
  <link rel="icon" type="image/png" href="../assets/favicon.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=7"></script>
  <script src="../js/api.js?v=7"></script>
  <script src="../js/validation.js?v=7"></script>
  <script src="../js/utils.js?v=7"></script>
  <script src="../js/auth-guard.js?v=7"></script>
  <script src="../js/settings.js?v=7"></script>
  <script src="../js/realtime.js?v=7"></script>
  <script src="../js/emoji-maps.js?v=7"></script>
  <script defer src="../js/app.js?v=7"></script>
  <script defer src="meals.js?v=8"></script>

</head>
<body data-section="meals">
  <!-- Page loader — inline so it paints before any CSS/JS loads -->
  <div id="page-loader" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(42,36,30,0.65);backdrop-filter:blur(4px);opacity:1;transition:opacity .2s ease;pointer-events:all">
    <div style="text-align:center;max-width:280px;font-family:'Lato',sans-serif">
      <div style="font-size:2rem;margin-bottom:.75rem" id="loader-icon">📅</div>
      <div style="color:#F1C338;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:.25rem" id="loader-label">Meal Planning</div>
      <div style="color:rgba(255,255,255,0.55);font-size:.65rem;letter-spacing:1px;margin-bottom:1rem" id="loader-subtitle">The Strategy</div>
      <div style="width:200px;height:3px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin:0 auto .75rem">
        <div id="loader-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#F1C338,#e0b530);border-radius:3px;transition:width .3s ease"></div>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:.8rem;font-style:italic;min-height:1.2em" id="loader-caption"></div>
    </div>
  </div>

  <header class="site-header">
    <div class="header-left">
      <h1 class="header-brand">
        Peachy Pantry
        <span class="header-brand-underline"></span>
      </h1>
    </div>
    <div class="header-right">
      <div class="header-datetime">
        <span id="utility-date"></span>
        <span class="datetime-separator">•</span>
        <span id="utility-time"></span>
      </div>
      <nav class="header-nav">
        <button class="btn-header-icon" id="btn-account" title="Account & Households">👤</button>
        <button class="btn-header-icon" id="btn-settings" title="Settings">⚙️</button>
      </nav>
    </div>
  </header>

  <nav class="sidebar-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn active" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn active" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <div class="main-content">
    <section class="meal-planning-section" id="meal-planning-section">
      <div class="meal-planning-header">
        <h2>MEAL PLANNER</h2>
      </div>

      <div class="calendar-nav">
        <button class="btn-calendar-nav" id="btn-prev-period" aria-label="Previous period">
          <span class="nav-arrow">&larr;</span>
          <span class="nav-label">Prev</span>
        </button>
        <div class="calendar-nav-center">
          <h3 class="calendar-period-label" id="calendar-period-label">Loading...</h3>
          <button class="btn-today" id="btn-today" aria-label="Go to today">Today</button>
        </div>
        <button class="btn-calendar-nav" id="btn-next-period" aria-label="Next period">
          <span class="nav-label">Next</span>
          <span class="nav-arrow">&rarr;</span>
        </button>
      </div>

      <div class="calendar-container" id="calendar-container" role="grid" aria-label="Meal calendar"></div>

      <div class="scheduled-recipes-section">
        <h3>Scheduled Meals</h3>
        <div id="scheduled-recipes-list" class="scheduled-recipes-list"></div>
      </div>
    </section>
  </div>

  <div id="modal-root"></div>

  <!-- Modal Templates -->
  <template id="tpl-day-modal">
    <div class="modal-overlay" data-action="close-modal">
      <div class="modal-content day-modal" role="dialog" aria-modal="true">
        <button class="modal-close" data-action="close-modal" aria-label="Close">&times;</button>
        <h2 data-field="heading"></h2>
        <div class="scheduled-meals" data-field="meals"></div>
        <hr>
        <h3>Add Meal</h3>
        <form id="add-meal-form">
          <div class="form-row">
            <div class="form-group">
              <label for="meal-recipe">Recipe</label>
              <select id="meal-recipe" required>
                <option value="">Select recipe...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="meal-type">Meal Type</label>
              <select id="meal-type">
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner" selected>Dinner</option>
                <option value="Snack">Snack</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Add to Plan</button>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-scheduled-meal-row">
    <div class="scheduled-meal-row">
      <span data-field="label"></span>
      <button type="button" class="btn-sm btn-danger" data-action="remove">Remove</button>
    </div>
  </template>

  <template id="tpl-cook-now-modal">
    <div class="modal-overlay" data-action="close-modal">
      <div class="modal-content cook-modal" role="dialog" aria-modal="true">
        <button class="modal-close" data-action="close-modal" aria-label="Close">&times;</button>
        <h2>Cook: <span data-field="recipeName"></span></h2>
        <h3>Ingredients needed:</h3>
        <ul data-field="ingredientsList"></ul>
        <p>This will deduct ingredients from your pantry.</p>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-action="close-modal">Cancel</button>
          <button type="button" class="btn btn-primary" data-action="cook">Mark as Cooked</button>
        </div>
      </div>
    </div>
  </template>
</body>
</html>
