<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Peachy Pantry — Recipes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Peachy Pantry Recipes — Store, scale, and discover recipes based on what's in your pantry.">
  <meta name="theme-color" content="#2A241E">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/shared.css?v=9">
  <link rel="stylesheet" href="recipes.css?v=9">
  <link rel="icon" type="image/png" href="../assets/favicon.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=9"></script>
  <script src="../js/api.js?v=8"></script>
  <script src="../js/validation.js?v=6"></script>
  <script src="../js/utils.js?v=6"></script>
  <script src="../js/auth-guard.js?v=8"></script>
  <script src="../js/settings.js?v=8"></script>
  <script src="../js/realtime.js?v=8"></script>
  <script src="../js/emoji-maps.js?v=6"></script>
  <script defer src="../js/app.js?v=8"></script>
  <script defer src="recipes.js?v=6"></script>

</head>
<body data-section="recipes">
  <!-- Page loader — inline so it paints before any CSS/JS loads -->
  <div id="page-loader" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(42,36,30,0.65);backdrop-filter:blur(4px);opacity:1;transition:opacity .2s ease;pointer-events:all">
    <div style="text-align:center;max-width:280px;font-family:'Lato',sans-serif">
      <div style="font-size:2rem;margin-bottom:.75rem" id="loader-icon">🍳</div>
      <div style="color:#F1C338;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:.25rem" id="loader-label">Recipes</div>
      <div style="color:rgba(255,255,255,0.55);font-size:.65rem;letter-spacing:1px;margin-bottom:1rem" id="loader-subtitle">The Inspiration</div>
      <div style="width:200px;height:3px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin:0 auto .75rem">
        <div id="loader-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#F1C338,#e0b530);border-radius:3px;transition:width .3s ease"></div>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:.8rem;font-style:italic;min-height:1.2em" id="loader-caption"></div>
    </div>
  </div>

  <!-- UNIFIED PURPLE HEADER BAR -->
  <header class="site-header">
    <div class="header-left">
      <h1 class="header-brand">
        Peachy Pantry
        <span class="header-brand-underline"></span>
      </h1>
    </div>
    <div class="header-right">
      <div class="header-datetime">
        <span id="utility-date"></span>
        <span class="datetime-separator">•</span>
        <span id="utility-time"></span>
      </div>
      <nav class="header-nav">
        <button class="btn-header-icon" id="btn-account" title="Account & Households">👤</button>
        <button class="btn-header-icon" id="btn-settings" title="Settings">⚙️</button>
      </nav>
    </div>
  </header>

  <!-- SIDEBAR NAVIGATION (Desktop) -->
  <nav class="sidebar-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn active" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <!-- BOTTOM NAVIGATION (Mobile) -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn active" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <!-- MAIN CONTENT AREA -->
  <div class="main-content">
    <!-- FLOATING ACTION BUTTON -->
    <div class="floating-action-menu fab-recipes" id="fab-recipes">
      <button class="floating-action-btn" id="fab-btn-recipe" title="Add Recipe" onclick="if(window.openRecipeModal) window.openRecipeModal(null)">+</button>
    </div>

    <!-- RECIPES SECTION -->
    <section class="recipes-section" id="recipes-section">
      <div class="recipes-header">
        <h2>RECIPE BOX</h2>
      </div>

      <div class="recipes-controls">
        <input type="text" id="recipe-search-ledger" placeholder="Search recipes..." class="recipe-search-input">
        <select id="recipe-sort-select" class="recipe-sort-select">
          <option value="a-z">Sort: A-Z</option>
          <option value="z-a">Sort: Z-A</option>
          <option value="favorites">Sort: Favorites First</option>
          <option value="recent">Sort: Recent</option>
        </select>
      </div>

      <div class="recipe-filters-container">
        <div class="recipe-filter-pills" id="recipe-filter-pills"></div>
      </div>

      <div class="recipe-tag-filters-container">
        <div class="recipe-tag-filter-pills" id="recipe-tag-filter-pills"></div>
      </div>

      <div class="recipes-grid" id="recipes-grid"></div>

      <div id="recipe-list" class="recipe-list" style="display: none;"></div>
    </section>
  </div>

  <div id="modal-root"></div>

  <!-- Modal Templates -->
  <template id="tpl-recipe-modal">
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-content recipe-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h2 data-field="heading">Add Recipe</h2>
        <form id="recipe-form">
          <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" id="recipe-name" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Servings</label>
              <input type="number" id="recipe-servings" value="4" min="1">
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="recipe-category">
                <option value="Breakfast">Breakfast</option>
                <option value="Brunch">Brunch</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Lunch & Dinner">Lunch &amp; Dinner</option>
                <option value="Breakfast & Lunch">Breakfast &amp; Lunch</option>
                <option value="Appetizer">Appetizer</option>
                <option value="Side">Side</option>
                <option value="Dessert">Dessert</option>
                <option value="Snack">Snack</option>
                <option value="Beverage">Beverage</option>
                <option value="Sauce & Dressing">Sauce &amp; Dressing</option>
                <option value="Soup & Stew">Soup &amp; Stew</option>
                <option value="Salad">Salad</option>
                <option value="Baked Goods">Baked Goods</option>
                <option value="Meal Prep">Meal Prep</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tags (comma separated)</label>
              <input type="text" id="recipe-tags" placeholder="Italian, Quick, etc">
            </div>
          </div>
          <div class="form-group">
            <label>Ingredients</label>
            <div id="ingredients-list"></div>
            <button type="button" class="btn-secondary btn-sm" onclick="addIngredientRow()">+ Add Ingredient</button>
          </div>
          <div class="form-group">
            <label>Instructions</label>
            <textarea id="recipe-instructions" rows="5"></textarea>
          </div>
          <div class="form-group">
            <label>Photo</label>
            <div class="photo-upload-row" style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
              <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin:0;" for="recipe-photo-file">Upload File</label>
              <input type="file" id="recipe-photo-file" accept="image/jpeg,image/png,image/webp,image/gif" capture="environment" style="display:none;">
              <span style="opacity:0.5;font-size:0.85rem;">or</span>
              <input type="url" id="recipe-photo-url" placeholder="Paste URL" style="flex:1;min-width:150px;">
            </div>
            <div id="photo-upload-status" style="font-size:0.8rem;margin-top:0.25rem;"></div>
            <img id="recipe-photo-preview" style="display:none;max-width:100%;max-height:120px;border-radius:8px;margin-top:0.5rem;object-fit:cover;">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-ingredient-row">
    <div class="ingredient-row">
      <input type="text" class="ing-name" placeholder="Ingredient" list="ingredient-suggestions">
      <input type="number" class="ing-qty" value="1" step="0.1" min="0">
      <input type="text" class="ing-unit" placeholder="unit" list="unit-suggestions">
    </div>
  </template>
</body>
</html>
