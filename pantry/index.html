<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Peachy Pantry — Pantry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Peachy Pantry Pantry — Track your inventory, set thresholds, and never run out of essentials.">
  <meta name="theme-color" content="#2A241E">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/shared.css?v=9">
  <link rel="stylesheet" href="pantry.css?v=9">
  <link rel="icon" type="image/png" href="../assets/favicon.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js?v=9"></script>
  <script src="../js/api.js?v=9"></script>
  <script src="../js/validation.js?v=9"></script>
  <script src="../js/utils.js?v=9"></script>
  <script src="../js/auth-guard.js?v=9"></script>
  <script src="../js/settings.js?v=9"></script>
  <script src="../js/realtime.js?v=9"></script>
  <script src="../js/emoji-maps.js?v=9"></script>
  <script defer src="../js/app.js?v=9"></script>
  <script defer src="pantry.js?v=9"></script>

  <!-- Onboarding visibility handled in pantry.css -->
</head>
<body data-section="pantry">
  <!-- Page loader — inline so it paints before any CSS/JS loads -->
  <div id="page-loader" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(42,36,30,0.65);backdrop-filter:blur(4px);opacity:1;transition:opacity .2s ease;pointer-events:all">
    <div style="text-align:center;max-width:280px;font-family:'Lato',sans-serif">
      <div style="font-size:2rem;margin-bottom:.75rem" id="loader-icon">🏺</div>
      <div style="color:#F1C338;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:.25rem" id="loader-label">Pantry</div>
      <div style="color:rgba(255,255,255,0.55);font-size:.65rem;letter-spacing:1px;margin-bottom:1rem" id="loader-subtitle">The Inventory</div>
      <div style="width:200px;height:3px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin:0 auto .75rem">
        <div id="loader-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#F1C338,#e0b530);border-radius:3px;transition:width .3s ease"></div>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:.8rem;font-style:italic;min-height:1.2em" id="loader-caption"></div>
    </div>
  </div>

  <header class="site-header">
    <div class="header-left">
      <h1 class="header-brand">
        Peachy Pantry
        <span class="header-brand-underline"></span>
      </h1>
    </div>
    <div class="header-right">
      <div class="header-datetime">
        <span id="utility-date"></span>
        <span class="datetime-separator">•</span>
        <span id="utility-time"></span>
      </div>
      <nav class="header-nav">
        <button class="btn-header-icon" id="btn-account" title="Account & Households">👤</button>
        <button class="btn-header-icon" id="btn-settings" title="Settings">⚙️</button>
      </nav>
    </div>
  </header>

  <nav class="sidebar-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn active" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="../recipes/" class="nav-btn" title="Recipes" aria-label="Recipes">🍳</a>
    <a href="../pantry/" class="nav-btn active" title="Pantry" aria-label="Pantry">🏺</a>
    <a href="../shopping/" class="nav-btn" title="Shopping" aria-label="Shopping">🛒</a>
    <a href="../meals/" class="nav-btn" title="Meal Planning" aria-label="Meal Planning">📅</a>
  </nav>

  <div class="main-content">
    <section class="pantry-section" id="pantry-section">
      <div class="pantry-header">
        <h2>PANTRY LEDGER</h2>
      </div>

      <div class="pantry-controls">
        <input type="text" id="pantry-search-ledger" placeholder="Search ingredients..." class="pantry-search-input" enterkeyhint="search">
        <select id="filter-category-ledger" class="pantry-filter-select">
          <option value="">All categories</option>
          <option value="Meat">Meat</option>
          <option value="Dairy">Dairy</option>
          <option value="Produce">Produce</option>
          <option value="Pantry">Pantry staples</option>
          <option value="Frozen">Frozen</option>
          <option value="Spices">Spices</option>
          <option value="Other">Other</option>
        </select>
        <select id="sort-pantry-ledger" class="pantry-sort-select">
          <option value="alpha">A-Z</option>
          <option value="lowStock">Low Stock First</option>
          <option value="expiring">Expiring Soon</option>
          <option value="recent">Recently Added</option>
        </select>
      </div>

      <div id="pantry-ledger-display" class="pantry-ledger-display"></div>
      <div id="pantry-display" class="pantry-display"></div>

      <button class="btn btn-new-entry" id="btn-new-pantry-entry">+ ADD ITEMS</button>
    </section>

    <!-- BULK ENTRY SECTION (hidden, toggled by Add Items button) -->
    <section class="onboarding-section" id="onboarding-section">
      <div class="onboarding-header">
        <div class="onboarding-title-row">
          <h2>BULK PANTRY ENTRY</h2>
          <div class="onboarding-status">
            <span id="onboarding-draft-status">Draft auto-saved</span>
            <span id="onboarding-item-count">0 items entered</span>
          </div>
        </div>
        <button class="btn-exit-onboarding" id="btn-exit-onboarding" title="Exit Bulk Entry">
          ← Back to Pantry
        </button>
      </div>

      <div class="onboarding-content">
        <div class="onboarding-instructions">
          <p>💡 <strong>Tips:</strong> Press Tab to move between cells • Enter to go to next row • Paste from Excel works!</p>
        </div>

        <div class="bulk-entry-table-wrapper">
          <table id="bulk-entry-table-live" class="bulk-entry-table">
            <thead>
              <tr>
                <th class="bulk-col-name">Item Name</th>
                <th class="bulk-col-qty">Quantity</th>
                <th class="bulk-col-unit">Unit</th>
                <th class="bulk-col-category">Category</th>
                <th class="bulk-col-location">Location</th>
                <th class="bulk-col-actions"></th>
              </tr>
            </thead>
            <tbody id="bulk-entry-tbody-live"></tbody>
          </table>
        </div>

        <div class="onboarding-actions">
          <div class="onboarding-actions-left">
            <button class="btn btn-secondary" id="btn-add-rows-live">+ Add 5 Rows</button>
            <button class="btn btn-secondary" id="btn-clear-all-live">Clear All</button>
          </div>
          <div class="onboarding-actions-right">
            <button class="btn btn-primary" id="btn-save-all-items">
              <span id="btn-save-text">Save & Add All Items</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="modal-root"></div>

  <!-- Modal Templates -->
  <template id="tpl-ingredient-modal">
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-content ingredient-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h2 data-field="heading">Add Pantry Item</h2>
        <form id="ingredient-form">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="ing-name" required list="ingredient-suggestions">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="ing-category"></select>
            </div>
            <div class="form-group">
              <label>Unit</label>
              <input type="text" id="ing-unit" placeholder="lb, oz, etc" list="unit-suggestions">
            </div>
            <div class="form-group">
              <label>Min Stock</label>
              <input type="number" id="ing-min" value="0" step="0.1" min="0">
            </div>
          </div>
          <div class="form-group">
            <label>Preferred Store</label>
            <input type="text" id="ing-preferred-store" placeholder="e.g. Costco, Trader Joe's" list="store-suggestions">
          </div>
          <div class="form-group">
            <label>Locations &amp; Quantities</label>
            <div id="locations-list"></div>
            <button type="button" class="btn-secondary btn-sm" onclick="addLocationRowWithDropdown()">+ Add Location</button>
          </div>
          <div class="form-actions" data-field="actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-location-row">
    <div class="location-row">
      <select class="loc-name"></select>
      <input type="number" class="loc-qty" value="1" step="0.1" min="0" placeholder="Qty">
      <input type="date" class="loc-expiry">
      <button type="button" class="btn-icon btn-remove" onclick="this.parentElement.remove()">&times;</button>
    </div>
  </template>

  <template id="tpl-quick-use-modal">
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-content quick-use-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h2>Use <span data-field="name"></span></h2>
        <p>Available: <span data-field="totalQty"></span> <span data-field="unit"></span></p>
        <form id="quick-use-form">
          <div class="form-group">
            <label>Amount to use</label>
            <input type="number" id="use-amount" value="1" step="0.1" min="0.1" data-attr-max="totalQty" required>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Use</button>
          </div>
        </form>
      </div>
    </div>
  </template>
</body>
</html>
